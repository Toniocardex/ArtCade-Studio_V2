name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  editor:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Editor tests
        run: cd editor; npm test -- --run

      - name: Editor production build
        run: npm run build

  native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap runtime libraries
        shell: pwsh
        run: npm run setup:runtime-libs

      - name: Configure MSVC for build_native.bat
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere not found on runner" }
          $install = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $install) { throw "Visual Studio with C++ tools not found on runner" }
          $devcmd = Join-Path $install "Common7\Tools\VsDevCmd.bat"
          Add-Content -Path $env:GITHUB_ENV -Value "ARTCADE_VSDEVCMD=$devcmd"

      - name: Native runtime and tests
        run: npm run build:cpp

  wasm:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Bootstrap runtime libraries
        shell: pwsh
        run: npm run setup:runtime-libs

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: '3.1.64'

      - name: Build WASM preview runtime
        shell: pwsh
        run: npm run build:wasm

      - name: Verify game.wasm copied into Vite public
        shell: pwsh
        run: |
          if (-not (Test-Path "editor/public/runtime/game.wasm")) {
            throw "Missing editor/public/runtime/game.wasm after build:wasm"
          }
          npm run build
          if (-not (Test-Path "editor/dist/runtime/game.wasm")) {
            throw "Missing editor/dist/runtime/game.wasm after npm run build"
          }
