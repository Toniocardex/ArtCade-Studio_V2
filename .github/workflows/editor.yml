name: editor

on:
  push:
    branches: [main]
    paths:
      - 'editor/**'
      - '.github/workflows/editor.yml'
  pull_request:
    paths:
      - 'editor/**'
      - '.github/workflows/editor.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Test
        run: npm test
