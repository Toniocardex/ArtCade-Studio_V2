<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="alternate icon" href="./favicon.ico" />
    <title>ArtCade Editor</title>
    <style>
      /* Critical layout + theme fallback if bundled CSS is blocked (Tauri CSP). */
      html, body, #root {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      :root {
        --bg: #09090b;
        --panel: #18181b;
        --border: #27272a;
        --text: #e4e4e7;
        --muted: #71717a;
        --accent: #3b82f6;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: ui-monospace, monospace;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
