<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="alternate icon" href="./favicon.ico" />
    <title>ArtCade Editor</title>
    <script src="./boot-theme-init.js"></script>
    <link rel="preload" href="./runtime/game.wasm" as="fetch" crossorigin />
    <link rel="stylesheet" href="./critical-layout.css" />
  </head>
  <body>
    <div id="root">
      <div id="boot-shell" aria-busy="true" aria-live="polite">
        <div class="boot-shell__panel">
          <h1 class="boot-shell__title">ArtCade Studio</h1>
          <p class="boot-shell__status">Starting…</p>
          <div class="boot-shell__bar" role="progressbar" aria-label="Loading">
            <div class="boot-shell__bar-fill"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
